name: Build Sort Visualizer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: SortVisualizer-windows
            output_name: SortVisualizer.exe
          - os: ubuntu-latest
            artifact_name: SortVisualizer-linux
            output_name: SortVisualizer
          - os: macos-latest
            artifact_name: SortVisualizer-macos
            output_name: SortVisualizer

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyInstaller
        run: python -m pip install --upgrade pip pyinstaller

      - name: Build executable
        run: pyinstaller --onefile --windowed --name SortVisualizer sort_visualizer_app.py

      - name: Rename executable
        shell: bash
        run: |
          mkdir -p release
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp dist/SortVisualizer.exe release/${{ matrix.output_name }}
          else
            cp dist/SortVisualizer release/${{ matrix.output_name }}
            chmod +x release/${{ matrix.output_name }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: release/*

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: release/**/*
